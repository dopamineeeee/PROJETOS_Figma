<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Avaliação do Serviço</title>

<style>

body{
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#f4f4f4;
}

.container{
background:white;
padding:30px;
border-radius:10px;
width:400px;
text-align:center;
}

.estrela{
font-size:40px;
cursor:pointer;
color:gray;
}

.ativa{
color:gold;
}

textarea{
width:100%;
height:80px;
margin-top:15px;
padding:10px;
border-radius:5px;
border:1px solid #ccc;
resize:none;
}

button{
margin-top:15px;
padding:10px 20px;
border:none;
border-radius:5px;
background:#333;
color:white;
cursor:pointer;
}

button:hover{
background:#555;
}

</style>

</head>

<body>

<div class="container">

<h2>Avalie nosso serviço 🚲</h2>

<p>Como foi o atendimento?</p>

<div id="estrelas">

<span class="estrela" onclick="avaliar(1)">★</span>
<span class="estrela" onclick="avaliar(2)">★</span>
<span class="estrela" onclick="avaliar(3)">★</span>
<span class="estrela" onclick="avaliar(4)">★</span>
<span class="estrela" onclick="avaliar(5)">★</span>

</div>

<textarea id="comentario" placeholder="Deixe um comentário (opcional)"></textarea>

<button onclick="enviarAvaliacao()">Enviar avaliação</button>

<p id="mensagem"></p>

</div>

<script>

let notaSelecionada = 0

function avaliar(nota){

notaSelecionada = nota

const estrelas = document.querySelectorAll(".estrela")

estrelas.forEach((estrela, index)=>{

if(index < nota){
estrela.classList.add("ativa")
}else{
estrela.classList.remove("ativa")
}

})

}

function enviarAvaliacao(){

const comentario = document.getElementById("comentario").value
const mensagem = document.getElementById("mensagem")

if(notaSelecionada === 0){

mensagem.innerText = "Selecione uma nota antes de enviar"
mensagem.style.color = "red"
return

}

mensagem.innerText = "Avaliação enviada com sucesso! ⭐"
mensagem.style.color = "green"

console.log("Nota:", notaSelecionada)
console.log("Comentário:", comentario)

}

</script>

</body>
</html>
