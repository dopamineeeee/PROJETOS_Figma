<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Buscar CEP</title>

<style>

body{
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#f4f4f4;
}

.container{
background:white;
padding:30px;
border-radius:10px;
width:400px;
text-align:center;
}

#mapa{
width:100%;
height:250px;
border:none;
margin-top:20px;
}

</style>

</head>

<body>

<div class="container">

<h2>Buscar CEP</h2>

<p>Data do orçamento: <strong id="dataRecebida"></strong></p>

<input type="text" id="cep" placeholder="Digite o CEP">

<br><br>

<button onclick="buscarCEP()">Buscar</button>

<p id="endereco"></p>

<iframe id="mapa"></iframe>

<br><br>

<button onclick="irParaAvaliacao()">Avançar para avaliação</button>

</div>

<script>

const parametros = new URLSearchParams(window.location.search)

const data = parametros.get("data")

document.getElementById("dataRecebida").innerText = data

function buscarCEP(){

let cep = document.getElementById("cep").value

fetch(`https://viacep.com.br/ws/${cep}/json/`)
.then(res => res.json())
.then(dados => {

let endereco = dados.logradouro + ", " + dados.bairro + ", " + dados.localidade

document.getElementById("endereco").innerText = endereco

document.getElementById("mapa").src =
`https://www.google.com/maps?q=${encodeURIComponent(endereco)}&output=embed`

})

}

function irParaAvaliacao(){
window.location.href = "avaliacao.html"
}

</script>

</body>
</html>
